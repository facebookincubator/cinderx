name: Publish to PyPI

on:
  # Weekly schedule - every Monday at 9:00 AM EST (14:00 UTC)
  schedule:
    - cron: '0 14 * * 1'

  # Allow manual trigger for emergency releases or same-day patches
  workflow_dispatch:
    inputs:
      patch_version:
        description: 'Patch version number (default: 0). Increment for multiple releases on the same day.'
        required: false
        default: '0'
        type: string

jobs:
  build_wheels:
    if: github.repository == 'facebookincubator/cinderx'
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    steps:
      - name: Checkout CinderX
        uses: actions/checkout@v6

      # cibuildwheel uses Python from a docker container.  The Python version is
      # controlled by selecting the docker image version in pyproject.toml.
      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CINDERX_VERSION_PATCH: ${{ inputs.patch_version || '0' }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    if: github.repository == 'facebookincubator/cinderx'
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CinderX
        uses: actions/checkout@v6

      # An sdist is just source code and doesn't contain compiled artifacts, it
      # doesn't need to be built per patch version.
      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install build tools
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist
        env:
          CINDERX_VERSION_PATCH: ${{ inputs.patch_version || '0' }}

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish:
    if: github.repository == 'facebookincubator/cinderx'
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing (OIDC)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: List distribution files
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
